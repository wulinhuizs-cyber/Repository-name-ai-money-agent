name: Daily AI News

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch RSS
        run: |
          curl https://rsshub.app/github/trending/daily > news.txt

      - name: Call Gemini API
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT="请从以下内容筛选：AI工具、赚钱机会、可执行方向。内容：$(cat news.txt)"

          RESPONSE=$(curl -s -X POST \
          "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-pro:generateContent?key=$API_KEY" \
          -H "Content-Type: application/json" \
          -d "{
            \"contents\": [{
              \"parts\": [{
                \"text\": \"$PROMPT\"
              }]
            }]
          }")

          echo "=== RESULT ==="
          echo "$RESPONSE"
