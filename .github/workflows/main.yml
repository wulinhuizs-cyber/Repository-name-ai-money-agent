name: Daily AI Money News

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch RSS
        run: |
          curl -s https://rsshub.app/github/trending/daily > news.txt
          curl -s https://rsshub.app/youtube/channel/UCiT9RITQ9PW6BhXK0y2jaeg >> news.txt
          curl -s https://rsshub.app/twitter/user/ShaanVP >> news.txt

      - name: Call Gemini API
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT="你是一个AI情报分析助手，请从以下内容中提取：
- AI新工具
- 可赚钱机会
- 可执行副业方向

内容如下：
$(cat news.txt)"

          curl -s -X POST \
          "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=$API_KEY" \
          -H "Content-Type: application/json" \
          -d "{
            \"contents\": [{
              \"parts\": [{
                \"text\": \"$PROMPT\"
              }]
            }]
          }"
          
