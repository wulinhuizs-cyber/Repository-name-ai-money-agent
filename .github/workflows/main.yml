- name: Build Prompt for AI
  run: |
    DATA=$(curl -s https://rsshub.app/producthunt/daily \
    | grep "<title>" \
    | sed 's/<[^>]*>//g' \
    | head -n 10)

    echo "================ AI日报输入模板 ================"
    echo ""
    echo "你是AI商业分析专家，请基于以下信息输出日报："
    echo "1. 今日AI趋势"
    echo "2. AI新工具/产品"
    echo "3. 赚钱机会（重点）"
    echo "4. 普通人可执行方案"
    echo "5. 关键AI知识点"
    echo ""
    echo "【信息源】"
    echo "$DATA"
    echo ""
    echo "==============================================="
