name: Daily AI Money News

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch RSS
        run: |
          curl https://rsshub.app/github/trending/daily > news.txt
          curl https://rsshub.app/youtube/channel/UCiT9RITQ9PW6BhXK0y2jaeg >> news.txt
          curl https://rsshub.app/twitter/user/ShaanVP >> news.txt

      - name: Call Gemini API (latest)
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT="你是一个AI信息分析助手。
请从以下内容中提取：
1. 新AI工具
2. 可能赚钱的机会
3. 可执行行动建议

内容：
$(cat news.txt)"

          curl -X POST \
          "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$API_KEY" \
          -H "Content-Type: application/json" \
          -d "{
            \"contents\": [{
              \"parts\": [{
                \"text\": \"$PROMPT\"
              }]
            }]
          }"
