name: Daily AI Money News

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch RSS
        run: |
          curl -s https://rsshub.app/github/trending/daily > news.txt

      - name: Call Gemini API
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT="请从以下内容中提取：AI新工具、赚钱机会、副业方向。内容：$(cat news.txt)"

          curl -s -X POST \
          "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=$API_KEY" \
          -H "Content-Type: application/json" \
          -d "{
            \"contents\": [{
              \"parts\": [{
                \"text\": \"$PROMPT\"
              }]
            }]
          }"
