name: Daily AI Money News

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch RSS
        run: |
          curl -s https://rsshub.app/github/trending/daily > news.txt

      - name: Call Gemini API
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          CONTENT=$(cat news.txt | tr '\n' ' ')

          curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=$API_KEY" \
          -H "Content-Type: application/json" \
          -d "{\"contents\":[{\"parts\":[{\"text\":\"请从以下信息中提取AI工具、赚钱机会和副业方向：$CONTENT\"}]}]}"
