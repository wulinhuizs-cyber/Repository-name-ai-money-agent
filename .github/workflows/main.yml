name: AI Money Intelligence

on:
  workflow_dispatch: # 让你手动点按钮运行
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上8点自动跑一次

jobs:
  run-spider:
    runs-on: ubuntu-latest
    steps:
      - name: 检查代码
        uses: actions/checkout@v3

      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装抓取工具
        run: pip install feedparser

      - name: 开始抓取并生成 Prompt
        run: python main.py
